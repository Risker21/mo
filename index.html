<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <link rel="icon" type="image/png" href="wp-content/themes/creatorspc/static/favicon/tapedotpink_logo_96x96.jpg"
    sizes="96x96" />
    <title>访问受限 - ACCESS DENIED</title>
    <style>
        :root {
            --bg-dark: #010409;
            --accent-glow: rgba(99, 102, 241, 0.3);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; perspective: 2000px;
            touch-action: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 背景 --- */
        #particleCanvas {
            position: fixed; inset: 0; z-index: 0;
            opacity: 0.8; pointer-events: none;
        }

        .background-aura {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            animation: pulseAura 8s ease-in-out infinite alternate;
        }
        
        @keyframes pulseAura {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
            /* Simple SVG noise */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4'/%3E%3C/svg%3E");
            opacity: 0.08;
        }

        /* --- 舞台 --- */
        .stage { text-align: center; z-index: 10; width: 100%; position: relative; }

        .characters-group {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 4rem; margin-bottom: 3rem; height: 320px;
            will-change: transform;
        }

        /* --- 角色容器 --- */
        .char-container {
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- 对话框 --- */
        .speech-bubble {
            position: absolute; bottom: 120%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.7rem 1.4rem;
            border-radius: 20px;
            font-size: 0.9rem; color: white;
            white-space: nowrap;
            opacity: 0; transform: translateY(10px) scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; z-index: 100;
        }

        .speech-bubble.active { opacity: 1; transform: translateY(0) scale(1); }

        /* --- 角色核心样式 --- */
        .character {
            position: relative; border-radius: 50%;
            transition: border-radius 0.3s ease;
            transform-style: preserve-3d;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .char-main { width: 170px; height: 170px; }
        .char-side { width: 110px; height: 110px; }

        /* 呼吸动画 */
        .char-container:nth-child(1) .character { animation: breathe 5s infinite ease-in-out; }
        .char-container:nth-child(2) .character { animation: breathe 4s infinite ease-in-out -1s; }
        .char-container:nth-child(3) .character { animation: breathe 6s infinite ease-in-out -2.5s; }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* 效果状态 */
        .effect-blank { background: linear-gradient(135deg, #2dd4bf, #0d9488); border: 4px solid #5eead4; }
        .effect-sad { background: linear-gradient(135deg, #3b82f6, #1d4ed8); border: 4px solid #93c5fd; }
        .effect-surprised { background: linear-gradient(135deg, #a855f7, #7c3aed); border: 4px solid #ddd6fe; }
        .effect-angry { background: linear-gradient(135deg, #f87171, #dc2626); border: 4px solid #fecaca; animation: shake 0.1s infinite !important; }
        
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(3px, -3px); } }

        /* --- 面部元素 --- */
        .face { width: 100%; height: 100%; position: relative; pointer-events: none; }
        
        .brow-group { position: absolute; top: 25%; width: 70%; left: 15%; display: flex; justify-content: space-between; }
        .brow { width: 35%; height: 6px; background: #0f172a; border-radius: 4px; transition: transform 0.1s ease-out; }

        .eye-group { position: absolute; top: 38%; width: 66%; left: 17%; display: flex; justify-content: space-between; }
        .eye { width: 26px; height: 26px; background: white; border-radius: 50%; position: relative; overflow: hidden; }
        .char-side .eye { width: 18px; height: 18px; }
        .pupil { width: 12px; height: 12px; background: #0f172a; border-radius: 50%; position: absolute; top: 20%; left: 20%; transition: transform 0.05s linear; }

        .mouth-wrap { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); }
        .mouth-svg { width: 60px; height: 30px; fill: none; stroke: #0f172a; stroke-width: 6; stroke-linecap: round; }

        /* --- 文案 --- */
        .content { 
            color: white; margin-top: 3rem; 
            position: relative;
        }
        
        h1 { 
            font-size: 4rem; font-weight: 900; 
            background: linear-gradient(to bottom, #ffffff, #94a3b8); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            letter-spacing: -2px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
            animation: floatText 6s ease-in-out infinite;
        }
        
        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        p { 
            color: #94a3b8; font-size: 1.2rem; margin-top: 1rem; 
            font-weight: 300; letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- 移动端适配 --- */
        @media (max-width: 768px) {
            .characters-group { gap: 1.2rem; height: 240px; }
            .char-main { width: 130px; height: 130px; }
            .char-side { width: 85px; height: 85px; }
            h1 { font-size: 2rem; }
            .eye { width: 18px; height: 18px; }
            .char-side .eye { width: 14px; height: 14px; }
            .mouth-svg { width: 45px; height: 25px; }
        }

        .ripple {
            position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%); pointer-events: none; animation: rippleEffect 0.6s ease-out;
        }
        @keyframes rippleEffect { from { width: 0; height: 0; opacity: 1; } to { width: 300px; height: 300px; opacity: 0; } }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="background-aura"></div>
    <div class="noise-overlay"></div>

    <div class="stage">
        <div class="characters-group" id="mainGroup">
            <div class="char-container">
                <div class="speech-bubble"></div>
                <div class="character char-side effect-blank">
                    <div class="face">
                        <div class="brow-group"><div class="brow"></div><div class="brow"></div></div>
                        <div class="eye-group">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="mouth-wrap"><svg class="mouth-svg" viewBox="0 0 60 30"><path class="mouth-path" d="M 15 15 L 45 15" /></svg></div>
                    </div>
                </div>
            </div>
            <div class="char-container">
                <div class="speech-bubble"></div>
                <div class="character char-main effect-sad">
                    <div class="face">
                        <div class="brow-group"><div class="brow"></div><div class="brow"></div></div>
                        <div class="eye-group">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="mouth-wrap"><svg class="mouth-svg" viewBox="0 0 60 30"><path class="mouth-path" d="M 10 20 Q 30 5 50 20" /></svg></div>
                    </div>
                </div>
            </div>
            <div class="char-container">
                <div class="speech-bubble"></div>
                <div class="character char-side effect-surprised">
                    <div class="face">
                        <div class="brow-group"><div class="brow"></div><div class="brow"></div></div>
                        <div class="eye-group">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="mouth-wrap"><svg class="mouth-svg" viewBox="0 0 60 30"><path class="mouth-path" d="M 20 20 A 10 10 0 1 0 40 20" /></svg></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <h1>ACCESS DENIED</h1>
            <p>抱歉，你暂时没有访问权限</p>
        </div>
    </div>

    <script>
        // --- 粒子系统 ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        // 交互状态管理
        let input = { x: -1000, y: -1000 }; // 原始输入坐标
        let current = { x: window.innerWidth/2, y: window.innerHeight/2 }; // 平滑后的坐标
        let isMoving = false; // 是否有触摸/鼠标交互
        let gyroInput = null; // 陀螺仪数据

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const count = window.innerWidth < 768 ? 50 : 120;
            for(let i=0; i<count; i++) particles.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                bx: Math.random()*canvas.width, by: Math.random()*canvas.height,
                s: Math.random()*2, d: Math.random()*20+5
            });
            // 重置坐标
            current.x = canvas.width / 2;
            current.y = canvas.height / 2;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        function drawParticles() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            
            // 目标坐标计算
            let targetX, targetY;
            if (isMoving) {
                targetX = input.x;
                targetY = input.y;
            } else if (gyroInput) {
                targetX = gyroInput.x;
                targetY = gyroInput.y;
            } else {
                targetX = canvas.width/2;
                targetY = canvas.height/2;
            }

            // 平滑插值 (Lerp)
            // 交互时更快(0.1)，回正/陀螺仪时更慢更平滑(0.05)
            const speed = isMoving ? 0.1 : 0.05;
            current.x += (targetX - current.x) * speed;
            current.y += (targetY - current.y) * speed;

            // 更新角色状态 (统一在 RAF 中调用以保证流畅)
            updateCharacters(current.x, current.y);
            
            // Draw connections first (behind particles)
            ctx.lineWidth = 0.5;
            for(let i=0; i<particles.length; i++) {
                for(let j=i+1; j<particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if(dist < 100) {
                        let opacity = 1 - (dist / 100);
                        ctx.strokeStyle = `rgba(147, 197, 253, ${opacity * 0.4})`; // blue-300
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            particles.forEach(p => {
                // 粒子避让使用平滑后的 current 坐标
                // 只有在有交互或陀螺仪生效时才避让，避免初始状态乱跑
                let dx = current.x - p.x; let dy = current.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                // 如果是默认中心点(无交互)，减弱避让效果或不避让
                // 这里我们选择只要 current 在动就避让
                if(dist < 150) {
                    p.x -= (dx/dist)*2; p.y -= (dy/dist)*2;
                } else {
                    p.x += (p.bx - p.x)*0.05; p.y += (p.by - p.y)*0.05;
                }
                
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.3 + 0.3})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        // 删除这里的 drawParticles() 调用，因为 handleMove 之前是直接调用的，
        // 但现在我们在下面初始化。不过原代码是在这里调用的。
        // 我们稍后在脚本末尾统一启动。
        
        // --- 核心面部交互逻辑 ---
        const charContainers = document.querySelectorAll('.char-container');
        const mainGroup = document.getElementById('mainGroup');
        const effects = ['effect-blank', 'effect-sad', 'effect-surprised', 'effect-angry'];

        // 将原 handleMove 的 DOM 操作逻辑提取为 updateCharacters
        function updateCharacters(posX, posY) {
            const normX = (posX - window.innerWidth/2) / (window.innerWidth/2);
            const normY = (posY - window.innerHeight/2) / (window.innerHeight/2);

            mainGroup.style.transform = `translate(${normX * 15}px, ${normY * 15}px)`;

            charContainers.forEach((container, i) => {
                const char = container.querySelector('.character');
                const rect = char.getBoundingClientRect();
                const cX = rect.left + rect.width/2;
                const cY = rect.top + rect.height/2;
                const dist = Math.sqrt(Math.pow(posX - cX, 2) + Math.pow(posY - cY, 2));
                const proximity = Math.max(0, 1 - dist / 350); // 感应半径 350px

                // 1. 整体倾斜
                char.style.transform = `rotateX(${-normY * 25}deg) rotateY(${normX * 30}deg)`;
                
                // 2. 眼神
                char.querySelectorAll('.pupil').forEach(p => {
                    p.style.transform = `translate(${normX * 10}px, ${normY * 10}px)`;
                });

                // 3. 眉毛挑动 (核心修复：根据接近距离 proximity 实时变化)
                char.querySelectorAll('.brow').forEach((b, j) => {
                    const lift = -proximity * 15; // 靠近时眉毛上扬
                    const tilt = (j === 0 ? -1 : 1) * (normY * 15 + proximity * 20);
                    b.style.transform = `translateY(${lift}px) rotate(${tilt}deg)`;
                });

                // 4. 嘴巴变形 (核心修复：实时修改 SVG Path)
                const mouthPath = char.querySelector('.mouth-path');
                if(i === 0) { // 左边：拉长
                    const len = 15 + proximity * 20;
                    mouthPath.setAttribute('d', `M ${30-len} 15 L ${30+len} 15`);
                } else if(i === 1) { // 中间：委屈变张嘴
                    const curve = 5 - proximity * 40; 
                    mouthPath.setAttribute('d', `M 10 20 Q 30 ${curve} 50 20`);
                } else if(i === 2) { // 右边：惊讶变大
                    const r = 5 + proximity * 10;
                    mouthPath.setAttribute('d', `M ${30-r} 20 A ${r} ${r} 0 1 0 ${30+r} 20 A ${r} ${r} 0 1 0 ${30-r} 20`);
                }
                
                // 5. 身体变形
                const rVal = 50 - proximity * 15;
                char.style.borderRadius = `${rVal}% ${rVal}% ${rVal}% ${rVal}%`;
            });
        }

        // 输入处理函数
        function handleInput(x, y) {
            input.x = x;
            input.y = y;
            isMoving = true;
        }

        window.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
        window.addEventListener('mouseleave', () => { isMoving = false; }); // 鼠标移出复位

        // 触摸事件处理优化
        window.addEventListener('touchmove', e => {
            e.preventDefault(); // 防止滚动
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        window.addEventListener('touchstart', e => {
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        window.addEventListener('touchend', () => {
            isMoving = false; // 手指离开后自动复位
        });
        
        // 陀螺仪支持 (可选，增加沉浸感)
        window.addEventListener('deviceorientation', (e) => {
            if (!isMoving && e.gamma && e.beta) {
                // 将陀螺仪数据映射到屏幕坐标
                // gamma: 左-90 ~ 右90
                // beta: 上-180 ~ 下180
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const maxTiltX = 30; // 最大倾斜角度范围
                const maxTiltY = 30;

                let tiltX = Math.max(-maxTiltX, Math.min(maxTiltX, e.gamma));
                let tiltY = Math.max(-maxTiltY, Math.min(maxTiltY, e.beta - 45)); // 默认手持角度45度

                if (!gyroInput) gyroInput = { x: 0, y: 0 };
                gyroInput.x = centerX + (tiltX / maxTiltX) * (centerX * 0.8);
                gyroInput.y = centerY + (tiltY / maxTiltY) * (centerY * 0.8);
            }
        });

        // 启动动画
        drawParticles();

        // 点击反馈
        charContainers.forEach((container, i) => {
            const char = container.querySelector('.character');
            const bubble = container.querySelector('.speech-bubble');
            const msgs = [
                ["哎呀！", "别碰我", "唔..."],
                ["好晕好晕", "呜呜别点我", "你要干嘛"],
                ["！吓死我了", "哼！", "快停下"]
            ];

            char.addEventListener('click', (e) => {
                // 涟漪效果
                const r = document.createElement('div');
                r.className = 'ripple';
                r.style.left = `${e.clientX || e.pageX}px`;
                r.style.top = `${e.clientY || e.pageY}px`;
                document.body.appendChild(r);
                setTimeout(()=>r.remove(), 600);

                // 随机切换状态
                effects.forEach(eff => char.classList.remove(eff));
                char.classList.add(effects[Math.floor(Math.random()*effects.length)]);

                // 气泡
                bubble.innerText = msgs[i][Math.floor(Math.random()*msgs[i].length)];
                bubble.classList.add('active');
                setTimeout(()=>bubble.classList.remove('active'), 1500);
            });
        });
    </script>
</body>
</html>
