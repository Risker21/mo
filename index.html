<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问受限</title>
    <link rel="icon" type="image/png" href="wp-content/themes/creatorspc/static/favicon/tapedotpink_logo_96x96.jpg"
    sizes="96x96" />
    <style>
        :root {
            --bg-dark: #010409;
            --char-blue: #3b82f6;
            --char-purple: #a855f7;
            --char-teal: #14b8a6;
            --accent-glow: rgba(99, 102, 241, 0.3);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            user-select: none;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; perspective: 2000px;
        }

        /* --- 动态粒子背景 --- */
        #particleCanvas {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .background-aura {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 50% 50%, #0d1117 0%, #010409 100%);
            filter: contrast(1.2);
        }

        /* --- 舞台 --- */
        .stage { text-align: center; z-index: 10; width: 100%; position: relative; }

        .characters-group {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 5rem; margin-bottom: 5rem; height: 350px;
            transition: transform 0.1s ease-out;
        }

        /* --- 角色容器 --- */
        .char-container {
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- 对话框 (高级磨砂 + 动态阴影) --- */
        .speech-bubble {
            position: absolute; bottom: 120%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.9rem 1.8rem;
            border-radius: 28px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 500;
            white-space: nowrap;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.05);
            opacity: 0;
            transform: translateY(25px) scale(0.7);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 100;
        }

        .speech-bubble.active {
            opacity: 1; transform: translateY(0) scale(1);
        }

        /* --- 角色基础 (动态流光效果) --- */
        .character {
            position: relative;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            overflow: visible;
        }

        /* 内部光泽 */
        .highlight {
            position: absolute; inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at var(--light-x, 50%) var(--light-y, 50%), rgba(255,255,255,0.4) 0%, transparent 65%);
            z-index: 5;
            pointer-events: none;
        }

        .char-main { width: 200px; height: 200px; animation: breathe 4s infinite ease-in-out; }
        .char-side { width: 130px; height: 130px; animation: breathe 6s infinite ease-in-out reverse; }

        @keyframes breathe {
            0%, 100% { transform: translateY(0) scale(1); filter: brightness(1); }
            50% { transform: translateY(-15px) scale(1.02); filter: brightness(1.1); }
        }

        /* --- 角色特定样式 --- */
        .effect-sad { background: linear-gradient(135deg, #3b82f6, #1d4ed8); border: 4px solid rgba(147, 197, 253, 0.5); }
        .effect-surprised { background: linear-gradient(135deg, #a855f7, #7c3aed); border: 4px solid rgba(233, 213, 255, 0.5); }
        .effect-shy { background: linear-gradient(135deg, #fbcfe8, #db2777); border: 4px solid rgba(252, 231, 243, 0.5); }
        .effect-angry { background: linear-gradient(135deg, #f87171, #dc2626); border: 4px solid rgba(254, 226, 226, 0.5); animation: shake 0.1s infinite !important; }
        .effect-dizzy { background: linear-gradient(135deg, #34d399, #059669); border: 4px solid rgba(209, 250, 229, 0.5); }
        .effect-blank { background: linear-gradient(135deg, #2dd4bf, #0d9488); border: 4px solid rgba(204, 251, 241, 0.5); }

        @keyframes shake { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(4px, -4px); } }

        /* --- 面部元素 (夸张联动) --- */
        .face { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; z-index: 1; }
        
        .brow-group {
            position: absolute; top: 25%; width: 75%; left: 50%;
            transform: translateX(-50%) translateZ(100px);
            display: flex; justify-content: space-between;
            transition: all 0.15s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .brow {
            width: 35px; height: 6px; background: rgba(15, 23, 42, 0.9);
            border-radius: 4px; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .char-side .brow { width: 24px; height: 5px; }

        .eye-group {
            position: absolute; top: 38%; width: 70%; left: 50%;
            transform: translateX(-50%) translateZ(90px);
            display: flex; justify-content: space-between;
            transition: all 0.1s ease-out;
        }
        .eye { 
            width: 32px; height: 32px; background: white; border-radius: 50%; 
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .char-side .eye { width: 22px; height: 22px; }
        .pupil { width: 14px; height: 14px; background: #0f172a; border-radius: 50%; transition: transform 0.05s linear; }
        
        .mouth-wrap { 
            position: absolute; bottom: 20%; left: 50%; 
            transform: translateX(-50%) translateZ(70px);
            transition: all 0.15s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .mouth-svg { 
            width: 70px; height: 35px; fill: none; stroke: rgba(15, 23, 42, 0.85); 
            stroke-width: 6; stroke-linecap: round;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- 内容文字 --- */
        .content { color: white; position: relative; z-index: 10; margin-top: 1rem; }
        h1 { 
            font-size: 4.5rem; font-weight: 900; margin-bottom: 1.5rem; letter-spacing: -0.06em; 
            background: linear-gradient(to bottom, #fff 40%, #475569 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
            animation: textGlow 3s infinite alternate;
        }
        @keyframes textGlow {
            from { filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6)); }
            to { filter: drop-shadow(0 15px 30px rgba(99, 102, 241, 0.4)); }
        }
        p { 
            color: #94a3b8; font-size: 1.3rem; line-height: 1.8; max-width: 600px; 
            margin: 0 auto; letter-spacing: 0.03em; font-weight: 500;
        }

        /* --- 点击涟漪 --- */
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            animation: rippleEffect 0.8s ease-out;
            pointer-events: none;
            z-index: 100;
        }
        @keyframes rippleEffect {
            from { width: 0; height: 0; opacity: 1; }
            to { width: 500px; height: 500px; opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="background-aura"></div>

    <div class="stage">
        <div class="characters-group" id="mainGroup">
            <!-- 角色 1 (左) - 惊讶/呆滞 -->
            <div class="char-container" id="container-0">
                <div class="speech-bubble" id="bubble-0"></div>
                <div class="character char-side effect-blank" id="char-0">
                    <div class="highlight"></div>
                    <div class="face">
                        <div class="brow-group">
                            <div class="brow left"></div><div class="brow right"></div>
                        </div>
                        <div class="eye-group">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="mouth-wrap">
                            <svg class="mouth-svg" viewBox="0 0 60 30"><path class="mouth-path" d="M 10 15 L 50 15" /></svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 角色 2 (中) - 委屈/主控 -->
            <div class="char-container" id="container-1">
                <div class="speech-bubble" id="bubble-1"></div>
                <div class="character char-main effect-sad" id="char-1">
                    <div class="highlight"></div>
                    <div class="face">
                        <div class="brow-group">
                            <div class="brow left"></div><div class="brow right"></div>
                        </div>
                        <div class="eye-group">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="mouth-wrap">
                            <svg class="mouth-svg" viewBox="0 0 60 30"><path class="mouth-path" d="M 10 20 Q 30 5 50 20" /></svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 角色 3 (右) - 傲娇/愤怒 -->
            <div class="char-container" id="container-2">
                <div class="speech-bubble" id="bubble-2"></div>
                <div class="character char-side effect-surprised" id="char-2">
                    <div class="highlight"></div>
                    <div class="face">
                        <div class="brow-group">
                            <div class="brow left"></div><div class="brow right"></div>
                        </div>
                        <div class="eye-group">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="mouth-wrap">
                            <svg class="mouth-svg" viewBox="0 0 60 30"><path class="mouth-path" d="M 20 15 A 10 10 0 1 0 40 15 A 10 10 0 1 0 20 15" /></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <h1>ACCESS DENIED</h1>
            <p>很抱歉，你没有访问此网站的资格</p>
        </div>
    </div>

    <script>
        // --- 1. 高级物理粒子背景 ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -1000, y: -1000 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 5;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 180) {
                    let force = (180 - distance) / 180;
                    this.x -= (dx / distance) * force * this.density;
                    this.y -= (dy / distance) * force * this.density;
                } else {
                    this.x += (this.baseX - this.x) * 0.05;
                    this.y += (this.baseY - this.y) * 0.05;
                }
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 180; i++) particles.push(new Particle());
        }
        initParticles();

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- 2. 交互逻辑与个性化对话系统 ---
        const chars = document.querySelectorAll('.character');
        const bubbles = document.querySelectorAll('.speech-bubble');
        const mainGroup = document.getElementById('mainGroup');
        const effects = ['effect-sad', 'effect-surprised', 'effect-shy', 'effect-angry', 'effect-dizzy', 'effect-blank'];
        
        // 每个角色独立的日常对话库
        const scenarios = [
            ["有人闯入！", "快看，有访客", "嘘...别出声", "他在干嘛呢？"],
            ["哎呀，你没权限", "没钥匙进不来哦", "呜呜，我也帮不了你", "这里是受保护的区域"],
            ["快走开啦！", "别盯着我看", "哼，真是个怪人", "再不走我就报警了"]
        ];

        // 每个角色独立的点击反馈对话库
        const clickResponses = [
            ["哎呀！轻点儿！", "干嘛点我？", "别碰我啦...", "呜呜，好疼"],
            ["唔！好晕呀", "你要做什么？", "哎呀，被点到了", "轻点轻点！"],
            ["放开我！", "别烦我！", "讨厌！", "谁让你点我的？"]
        ];

        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            const x = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            const y = (e.clientY - window.innerHeight / 2) / (innerHeight / 2);

            mainGroup.style.transform = `translate(${x * 10}px, ${y * 10}px)`;

            chars.forEach((char, i) => {
                const rect = char.getBoundingClientRect();
                const charCenterX = rect.left + rect.width / 2;
                const charCenterY = rect.top + rect.height / 2;
                const dist = Math.sqrt(Math.pow(e.clientX - charCenterX, 2) + Math.pow(e.clientY - charCenterY, 2));
                const proximity = Math.max(0, 1 - dist / 450); 

                const factor = 1 + i * 0.12;
                char.style.transform = `rotateX(${-y * 35 * factor}deg) rotateY(${x * 40 * factor}deg)`;
                char.style.setProperty('--light-x', `${50 + x * 70}%`);
                char.style.setProperty('--light-y', `${50 + y * 70}%`);

                const tl = 45 + y * 18; const tr = 55 - y * 18;
                const bl = 50 - x * 15; const br = 50 + x * 15;
                char.style.borderRadius = `${tl}% ${tr}% ${br}% ${bl}% / ${50 + y * 15}% ${50 + y * 15}% ${50 - y * 15}% ${50 - y * 15}%`;

                const browGroup = char.querySelector('.brow-group');
                const eyeGroup = char.querySelector('.eye-group');
                const mouthWrap = char.querySelector('.mouth-wrap');
                const mouthPath = char.querySelector('.mouth-path');

                browGroup.style.transform = `translateX(-50%) translateZ(100px) translateY(${y * 20 - proximity * 15}px)`;
                char.querySelectorAll('.brow').forEach((b, j) => {
                    const angle = (j === 0 ? -12 : 12) + (y * 25) + (proximity * (j === 0 ? 35 : -35));
                    b.style.transform = `rotate(${angle}deg)`;
                });

                char.querySelectorAll('.eye').forEach(eye => {
                    eye.style.transform = `scale(${1 + proximity * 0.5})`;
                    const pupil = eye.querySelector('.pupil');
                    pupil.style.transform = `translate(${x * 12}px, ${y * 12}px)`;
                });

                const mY = y * 15 + proximity * 20;
                mouthWrap.style.transform = `translateX(-50%) translateZ(80px) translateY(${mY}px)`;
                
                if (i === 1) { 
                    const bend = 20 - proximity * 50;
                    mouthPath.setAttribute('d', `M 10 ${20 - proximity * 8} Q 30 ${bend} 50 ${20 - proximity * 8}`);
                }
            });
        });

        // 点击效果与个性化反馈
        chars.forEach((char, i) => {
            char.addEventListener('click', (e) => {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = `${e.clientX}px`;
                ripple.style.top = `${e.clientY}px`;
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 800);

                const nextEff = effects[Math.floor(Math.random() * effects.length)];
                effects.forEach(eff => char.classList.remove(eff));
                char.classList.add(nextEff);

                // 触发个性化点击反馈对话
                const bubble = bubbles[i];
                const charResponses = clickResponses[i];
                bubble.innerText = charResponses[Math.floor(Math.random() * charResponses.length)];
                bubble.classList.add('active');
                
                // 点击后暂停日常对话一段时间
                clearTimeout(char.chatTimer);
                setTimeout(() => {
                    bubble.classList.remove('active');
                }, 1500);
            });
        });

        // 智能剧情对话逻辑
        let currentTalker = 0;
        function runStory() {
            const bubble = bubbles[currentTalker];
            const charScenarios = scenarios[currentTalker];
            
            // 如果对话框已经是激活状态（可能刚被点击），则跳过本次自动对话
            if (!bubble.classList.contains('active')) {
                bubble.innerText = charScenarios[Math.floor(Math.random() * charScenarios.length)];
                bubble.classList.add('active');
                
                setTimeout(() => {
                    bubble.classList.remove('active');
                    currentTalker = (currentTalker + 1) % 3;
                    setTimeout(runStory, 2000 + Math.random() * 2000);
                }, 3000);
            } else {
                currentTalker = (currentTalker + 1) % 3;
                setTimeout(runStory, 1000);
            }
        }
        setTimeout(runStory, 1500);
    </script>
</body>
</html>
