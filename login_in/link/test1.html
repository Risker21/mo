<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晨光手札 | Premium Morning Notes</title>
    <link rel="icon" href="../images/favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f8f6;
            --panel: rgba(255, 255, 255, 0.6);
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --accent-warm: #ffb199;
            --accent-cool: #a1c4fd;
            --highlight: #fbc2eb;
            --border: rgba(161, 196, 253, 0.2);
            --cursor-color: #7158e2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Hide default cursor */
        }

        body {
            min-height: 100vh;
            font-family: 'Noto Serif SC', serif;
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            display: grid;
            place-items: center;
            perspective: 1500px;
        }

        /* Animated Background Gradients */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 15% 50%, rgba(255, 177, 153, 0.12), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(161, 196, 253, 0.15), transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(251, 194, 235, 0.12), transparent 50%);
            filter: blur(60px);
            animation: breathe 10s ease-in-out infinite alternate;
        }

        /* Subtle Noise Grain */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-circle {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        .cursor-dot {
            width: 6px;
            height: 6px;
            background-color: var(--cursor-color);
            transition: width 0.2s, height 0.2s;
        }

        .cursor-circle {
            width: 34px;
            height: 34px;
            border: 1px solid rgba(113, 88, 226, 0.5);
            transition: width 0.3s, height 0.3s, border-color 0.3s, transform 0.15s ease-out;
        }

        .cursor-hover .cursor-dot {
            width: 0;
            height: 0;
        }

        .cursor-hover .cursor-circle {
            width: 50px;
            height: 50px;
            background-color: rgba(113, 88, 226, 0.1);
            border-color: rgba(113, 88, 226, 0.8);
            backdrop-filter: blur(2px);
        }

        /* Main Container */
        .stage {
            position: relative;
            z-index: 2;
            width: min(92vw, 1100px);
            min-height: 600px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), var(--panel));
            box-shadow: 0 40px 80px rgba(161, 196, 253, 0.12), inset 0 0 40px rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(24px);
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-style: preserve-3d;
        }

        /* Left Panel */
        .left {
            padding: 64px 72px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .left::after {
            content: '';
            position: absolute;
            right: 0;
            top: 10%;
            height: 80%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--border), transparent);
        }

        .tag {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.3em;
            font-size: 12px;
            color: #8fa0b5;
            text-transform: uppercase;
            display: inline-block;
            position: relative;
            margin-bottom: 24px;
        }

        h1 {
            line-height: 1.2;
            font-size: clamp(36px, 4.8vw, 60px);
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text-main);
            position: relative;
        }

        h1 span {
            background: linear-gradient(120deg, #34495e, #7158e2, #34495e);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientText 6s linear infinite;
        }

        .lead {
            margin-top: 24px;
            font-size: 16px;
            color: var(--text-sub);
            line-height: 2.2;
            max-width: 480px;
            font-weight: 300;
        }

        /* Interactive Buttons */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-main);
            padding: 14px 28px;
            border-radius: 999px;
            letter-spacing: 0.15em;
            font-size: 13px;
            font-weight: 500;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent-cool), var(--highlight));
            color: #fff;
            box-shadow: 0 10px 20px rgba(161, 196, 253, 0.3);
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 30px rgba(161, 196, 253, 0.4);
            background: #fff;
            color: var(--cursor-color);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #8fb8fc, #f9b1e5);
            color: #fff;
        }

        /* Magnetic effect wrapper for button */
        .magnetic-wrap {
            display: inline-block;
        }

        /* Right Panel */
        .right {
            padding: 56px 48px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 3D Tilt Cards */
        .card {
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.6));
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            transition: transform 0.1s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }

        .card:hover {
            box-shadow: 0 20px 40px rgba(161, 196, 253, 0.2);
            z-index: 10;
        }

        .card-content {
            transform: translateZ(30px); /* 3D pop out effect */
        }

        .card h3 {
            font-size: 15px;
            letter-spacing: 0.15em;
            color: #34495e;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h3::before {
            content: '';
            display: block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent-warm);
            box-shadow: 0 0 10px var(--accent-warm);
        }

        .card p {
            color: var(--text-sub);
            line-height: 1.8;
            font-size: 14px;
            font-weight: 300;
        }

        /* Seal / Reveal Section */
        .seal-area {
            text-align: center;
            padding-top: 10px;
            perspective: 1000px;
        }

        .seal {
            width: 72px;
            height: 72px;
            margin: 0 auto;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            box-shadow: 0 10px 25px rgba(255, 154, 158, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.6);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .seal::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(255, 154, 158, 0.3);
            animation: pulse 2s infinite;
        }

        .seal:hover {
            transform: scale(1.15) rotate(15deg);
            box-shadow: 0 15px 35px rgba(255, 154, 158, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
        }

        .secret {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-20px) rotateX(-20deg);
            transform-origin: top;
        }

        .secret.show {
            opacity: 1;
            max-height: 200px;
            margin-top: 24px;
            transform: translateY(0) rotateX(0);
        }

        .secret p {
            color: #576574;
            line-height: 2;
            font-size: 14px;
            letter-spacing: 0.05em;
            font-weight: 400;
        }

        /* Typewriter & Quotes */
        .typing {
            margin-top: 20px;
            color: var(--cursor-color);
            min-height: 28px;
            letter-spacing: 0.1em;
            font-size: 15px;
            font-weight: 500;
        }

        .typing::after {
            content: '|';
            animation: blink 1s infinite;
        }

        .quote {
            margin-top: auto;
            padding-top: 32px;
            color: #8fa0b5;
            font-size: 15px;
            line-height: 1.8;
            font-style: italic;
            position: relative;
            transition: opacity 0.4s ease;
        }

        .quote::before {
            content: '“';
            font-family: 'Cinzel', serif;
            font-size: 60px;
            color: rgba(161, 196, 253, 0.2);
            position: absolute;
            top: 10px;
            left: -20px;
            z-index: -1;
        }

        /* Global Click Burst Particles */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            animation: burst 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes burst {
            0% { transform: scale(0) translate(0, 0); opacity: 1; }
            100% { transform: scale(1) translate(var(--tx), var(--ty)); opacity: 0; }
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } }
        @keyframes breathe { 0% { opacity: 0.7; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
        @keyframes gradientText { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }

        /* Responsive Design */
        @media (max-width: 960px) {
            .stage {
                grid-template-columns: 1fr;
                width: 90vw;
                margin: 40px 0;
            }
            .left {
                padding: 48px 32px;
            }
            .left::after {
                width: 80%;
                height: 1px;
                top: auto;
                bottom: 0;
                right: 10%;
                background: linear-gradient(to right, transparent, var(--border), transparent);
            }
            .right {
                padding: 40px 32px;
            }
            h1 { font-size: 32px; }
            .quote { padding-top: 20px; margin-top: 20px; }
        }
    </style>
</head>
<body>
    <!-- Ambient Background -->
    <div class="ambient-bg"></div>
    <div class="grain"></div>

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-circle" id="cursor-circle"></div>

    <!-- Main Content -->
    <main class="stage" id="stage">
        <section class="left">
            <div>
                <div class="tag">Morning Whispers</div>
                <h1>晨光微露，<br><span>美好正在发生</span></h1>
                <p class="lead">
                    把第一缕阳光折进信封，连同清晨的微风一起寄给你。这里没有繁杂的喧嚣，只有刚刚苏醒的温柔与期盼，和每一次触碰带来的惊喜。
                </p>
                <div class="typing" id="typing-line"></div>
                <div class="controls">
                    <div class="magnetic-wrap"><button class="btn btn-primary" id="unlock-btn">拆开信笺</button></div>
                    <div class="magnetic-wrap"><button class="btn" id="switch-btn">换个心情</button></div>
                </div>
            </div>

            <div class="quote" id="quote-box">
                每一个清晨，都是一次充满无限可能的重启。
            </div>
        </section>

        <section class="right">
            <article class="card tilt-card">
                <div class="card-content">
                    <h3>01 / 晨间收集</h3>
                    <p>收集叶片上的露水，捕捉云朵的边缘，把这些微小的确幸记录在崭新的一天里。</p>
                </div>
            </article>

            <article class="card tilt-card">
                <div class="card-content">
                    <h3>02 / 寄语微风</h3>
                    <p>有些话语如同晨风般轻柔，不需要声嘶力竭，也能在心底泛起层层涟漪。</p>
                </div>
            </article>

            <div class="seal-area">
                <div class="seal" id="seal">S</div>
                <p style="margin-top:16px; color:#8fa0b5; letter-spacing:0.05em; font-size:12px; text-transform:uppercase;">Touch to Reveal</p>
                <div class="secret card" id="secret-box">
                    <div class="card-content">
                        <p>
                            愿你的今天，<br>
                            有恰到好处的阳光，和不期而遇的惊喜。<br>
                            步履不停，心怀暖意。
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- 1. Custom Cursor ---
        const cursorDot = document.getElementById('cursor-dot');
        const cursorCircle = document.getElementById('cursor-circle');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let circleX = mouseX;
        let circleY = mouseY;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';
        });

        // Smooth follow for the circle
        function animateCursor() {
            circleX += (mouseX - circleX) * 0.15;
            circleY += (mouseY - circleY) * 0.15;
            cursorCircle.style.left = circleX + 'px';
            cursorCircle.style.top = circleY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Cursor hover effect on interactable elements
        const interactables = document.querySelectorAll('button, .seal, .card');
        interactables.forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
        });

        // --- 2. Global Click Burst Effect (Surprise on every click) ---
        const colors = ['#ffb199', '#a1c4fd', '#fbc2eb', '#7158e2'];
        document.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY);
        });

        function createBurst(x, y) {
            const particleCount = 12;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                document.body.appendChild(particle);

                const size = Math.random() * 6 + 4;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';

                // Random direction
                const angle = Math.random() * Math.PI * 2;
                const velocity = 30 + Math.random() * 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');

                // Remove after animation
                setTimeout(() => {
                    particle.remove();
                }, 800);
            }
        }

        // --- 3. 3D Tilt Effect for Cards ---
        const tiltCards = document.querySelectorAll('.tilt-card, .secret');
        tiltCards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = ((y - centerY) / centerY) * -8; // Max rotation 8deg
                const rotateY = ((x - centerX) / centerX) * 8;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
            });
        });

        // --- 4. Magnetic Buttons ---
        const magneticWraps = document.querySelectorAll('.magnetic-wrap');
        magneticWraps.forEach(wrap => {
            const btn = wrap.querySelector('.btn');
            wrap.addEventListener('mousemove', (e) => {
                const rect = wrap.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                
                btn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
            });
            wrap.addEventListener('mouseleave', () => {
                btn.style.transform = `translate(0px, 0px)`;
            });
        });

        // --- 5. Interactive Logic & Typing ---
        const typingLine = document.getElementById('typing-line');
        const quoteBox = document.getElementById('quote-box');
        const unlockBtn = document.getElementById('unlock-btn');
        const switchBtn = document.getElementById('switch-btn');
        const seal = document.getElementById('seal');
        const secretBox = document.getElementById('secret-box');

        const typingTexts = [
            '今日宜：深呼吸，迎着光。',
            '心事清零：新的一天开始了。',
            '正在加载：百分百的好运。',
            '提示：每一次点击都有惊喜。'
        ];
        let tIndex = 0;

        const quoteTexts = [
            '光总是打在那些勇敢迎向它的人身上。',
            '不必太纠结于当下，也不必太忧虑未来。',
            '清晨的粥比深夜的酒好喝，晨光的温暖比夜色的深沉更迷人。',
            '把烦恼留在昨天，把希望交给今天。'
        ];
        let qIndex = 0;

        function typeWriter(text) {
            typingLine.textContent = '';
            let i = 0;
            clearInterval(window.typingTimer);
            window.typingTimer = setInterval(() => {
                typingLine.textContent += text[i];
                i++;
                if (i >= text.length) clearInterval(window.typingTimer);
            }, 80);
        }

        typeWriter(typingTexts[tIndex]);
        setInterval(() => {
            tIndex = (tIndex + 1) % typingTexts.length;
            typeWriter(typingTexts[tIndex]);
        }, 5000);

        unlockBtn.addEventListener('click', () => {
            secretBox.classList.add('show');
            quoteBox.style.opacity = 0;
            setTimeout(() => {
                quoteBox.textContent = '信件已拆开：今天也会是美好的一天。';
                quoteBox.style.opacity = 1;
            }, 400);
        });

        switchBtn.addEventListener('click', () => {
            qIndex = (qIndex + 1) % quoteTexts.length;
            quoteBox.style.opacity = 0;
            setTimeout(() => {
                quoteBox.textContent = quoteTexts[qIndex];
                quoteBox.style.opacity = 1;
            }, 400);
        });

        seal.addEventListener('click', () => {
            secretBox.classList.toggle('show');
        });
    </script>
</body>
</html>
